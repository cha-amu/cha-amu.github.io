name: Update admin password

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Write clasp credentials for root sync script
        run: |
          cat > ~/.clasprc.json <<'JSON'
          ${{ secrets.CLASPRC_JSON }}
          JSON
          node <<'NODE'
          const fs = require('node:fs');
          const clasp = JSON.parse(process.env.CLASP_JSON || '{}');
          if (!clasp.scriptId) throw new Error('CLASP_JSON secret must include scriptId.');
          clasp.rootDir = 'apps-script';
          clasp.scriptExtensions ||= ['.js', '.gs'];
          clasp.htmlExtensions ||= ['.html'];
          clasp.jsonExtensions ||= ['.json'];
          clasp.filePushOrder ||= [];
          clasp.skipSubdirectories = Boolean(clasp.skipSubdirectories);
          fs.writeFileSync('.clasp.json', JSON.stringify(clasp, null, 2));
          NODE
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}

      - name: Sync Apps Script admin password properties
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_PASSWORD_PEPPER: ${{ secrets.ADMIN_PASSWORD_PEPPER }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GUESTBOOK_SERVER_PEPPER: ${{ secrets.GUESTBOOK_SERVER_PEPPER }}
          GUESTBOOK_PASSWORD_ITERATIONS: '1'
          ADMIN_SESSION_TTL_MS: ${{ vars.VITE_ADMIN_IDLE_TIMEOUT_MS || '600000' }}
          GATEWAY_SHARED_SECRET: ${{ secrets.GATEWAY_SHARED_SECRET }}
        run: |
          test -n "$ADMIN_PASSWORD" || { echo 'ADMIN_PASSWORD repository secret is required.'; exit 1; }
          test -n "$ADMIN_PASSWORD_PEPPER" || { echo 'ADMIN_PASSWORD_PEPPER repository secret is required.'; exit 1; }
          test -n "$ADMIN_SESSION_SECRET" || { echo 'ADMIN_SESSION_SECRET repository secret is required.'; exit 1; }
          test -n "$SPREADSHEET_ID" || { echo 'SPREADSHEET_ID repository secret is required.'; exit 1; }
          test -n "$GUESTBOOK_SERVER_PEPPER" || { echo 'GUESTBOOK_SERVER_PEPPER repository secret is required.'; exit 1; }
          test -n "$GATEWAY_SHARED_SECRET" || { echo 'GATEWAY_SHARED_SECRET repository secret is required.'; exit 1; }
          npm run sync:apps-script-env
