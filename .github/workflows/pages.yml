name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://cha-amu-gateway.cha-amu.workers.dev/api' }}
          VITE_STORAGE_BASE_URL: ${{ vars.VITE_STORAGE_BASE_URL || 'https://cha-amu.github.io/storage' }}
          VITE_ARCHIVE_MANIFEST_URL: ${{ vars.VITE_ARCHIVE_MANIFEST_URL || 'https://cha-amu.github.io/storage/manifests/assets.json' }}
          VITE_STORAGE_POSTS_MANIFEST_URL: ${{ vars.VITE_STORAGE_POSTS_MANIFEST_URL || 'https://cha-amu.github.io/storage/manifests/posts.json' }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY || '0x4AAAAAADzr-jSxSMZf9xcv' }}
          VITE_ADMIN_IDLE_TIMEOUT_MS: ${{ vars.VITE_ADMIN_IDLE_TIMEOUT_MS || '60000' }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
